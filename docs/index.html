<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>마피아게임: 라스트 알리바이</title>
    <style>
        :root {
            color-scheme: dark;
            --bg: #11100f;
            --panel: #1b1715;
            --line: #3b2b25;
            --text: #f3eadf;
            --muted: #d7c1aa;
            --accent: #d96d4f;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            font-family: "Segoe UI", "Malgun Gothic", sans-serif;
            background: radial-gradient(circle at top, #2a201b 0%, var(--bg) 60%);
            color: var(--text);
        }

        main {
            width: min(720px, 100%);
            background: rgba(27, 23, 21, 0.94);
            border: 1px solid var(--line);
            border-radius: 24px;
            padding: 32px;
            text-align: center;
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
        }

        h1 {
            margin: 0 0 12px;
            font-size: clamp(2rem, 6vw, 3.2rem);
            line-height: 1.1;
        }

        p {
            margin: 0 0 20px;
            color: var(--muted);
            line-height: 1.7;
        }

        a {
            display: inline-block;
            padding: 14px 24px;
            border-radius: 999px;
            background: linear-gradient(135deg, #f0b367, #d78339);
            color: #201610;
            text-decoration: none;
            font-weight: 700;
        }
    </style>
</head>
<body>
<main>
    <h1>마피아게임: 라스트 알리바이</h1>
    <p>Google Play 등록용 페이지입니다. 아래 버튼에서 개인정보처리방침을 확인할 수 있습니다.</p>
    <a href="./privacy/">개인정보처리방침 보기</a>
</main>
</body>
</html>
